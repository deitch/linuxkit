# Sample YAML file for manual testing
kernel:
  image: linuxkit/kernel:6.6.13
  cmdline: "console=ttyS0"
init:
  - linuxkit/init:da8b633b6f6d0cb58b2302bd1ed54acee6d06245
  - linuxkit/runc:01a2389b9e2ebbb4642d95ce16a2a309c2f46c33
onboot:
  - name: test-ns
    image: linuxkit/test-ns:39150a45a7fa82e336e9e0e60af9cf7eb7337121
    command: ["/bin/sh", "/runp-runc-net.sh", "mix-unix"]
    # command: ["/bin/sh", "/runc-net.sh", "-l", "5", "-i", "2", "-c", "5", "-p", "unix", "-ip", "6"]
    mounts: # for runc
    - type: cgroup
      options: ["rw"]
  - name: poweroff
    image: linuxkit/poweroff:17dcd9167e1e0ca8dd6005ecbc1dd2e041e98cb9
    command: ["/bin/sh", "/poweroff.sh", "3"]
