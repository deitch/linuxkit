kernel:
  image: linuxkit/kernel:6.6.13
  cmdline: "console=ttyS0 console=ttyAMA0"
init:
  - linuxkit/init:da8b633b6f6d0cb58b2302bd1ed54acee6d06245
  - linuxkit/runc:01a2389b9e2ebbb4642d95ce16a2a309c2f46c33
onboot:
  - name: format
    image: linuxkit/format:a76845af039f8e41f1d846160e51882fe892b544
    command: ["/usr/bin/format", "-type", "xfs"]
  - name: mount
    image: linuxkit/mount:67e0740f85dc6e08cc241d60cf4dc8fd2ae930b3
    command: ["/usr/bin/mountie", "/var/lib/docker"]
  - name: test
    image: alpine:3.19
    binds:
      - /var/lib/docker:/var/lib/docker
    command: ["touch", "/var/lib/docker/bar"]
  - name: poweroff
    image: linuxkit/poweroff:17dcd9167e1e0ca8dd6005ecbc1dd2e041e98cb9
    command: ["/bin/sh", "/poweroff.sh", "10"]
